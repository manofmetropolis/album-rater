<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Album Rater</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rob's Album Rater</h1>
    <input type="text" id="coverInput" placeholder="Cover Image URL" />
    
    <input type="text" id="artistInput" placeholder="Artist" />

    <input type="text" id="albumInput" placeholder="Album Name" />

    <input type="text" id="releaseYearInput" placeholder="Released" />

    <input
      type="number"
      name=""
      id="ratingInput"
      min="1"
      max="10"
      placeholder="Rating"
    />

    <button id="addButton">Add Album</button>

    <ul id="albumList"></ul>

    <script src="script.js"></script>
  </body>
</html>
